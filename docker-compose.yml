services:
  # -------------------------------------------------
  # PostgreSQL – persistent data store
  # -------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: md_editor_pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data

  # -------------------------------------------------
  # Front‑end (static site served by nginx)
  # -------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: md_editor_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      API_URL: http://backend:8080   # optional – tells the UI where the API lives

  # -------------------------------------------------
  # Back‑end (Rust binary)
  # -------------------------------------------------
  backend:
    # Force an architecture that definitely has a nightly image.
    # Use `linux/amd64` on typical x86_64 machines.
    # If you are on Apple Silicon, change to `linux/arm64`.
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: md_editor_backend
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

volumes:
  pg_data:
